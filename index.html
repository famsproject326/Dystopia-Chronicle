<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dystopia: The Lost Code</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <button id="map-open-btn" style="position:fixed; top:10px; right:10px; z-index:9998; padding:10px; font-size:16px;">MAP</button>

    <div id="map-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white;">
        <h3>30F FLOOR MAP</h3>
        <div style="width:280px; height:350px; border:1px solid #555; position:relative; background:#111; margin-bottom:20px;">
            <div style="position:absolute; top:20px; left:20px; border:1px solid white; padding:10px;">302</div>
            <div style="position:absolute; top:20px; right:20px; border:1px solid white; padding:10px;">301</div>
            <div style="position:absolute; bottom:20px; left:20px; border:1px solid white; padding:10px;">303</div>
            <div style="position:absolute; bottom:20px; right:20px; border:1px solid white; padding:10px;">Lobby</div>
            <div style="position:absolute; top:45px; left:60px; width:160px; height:1px; background:white;"></div>
            <div style="position:absolute; bottom:45px; left:60px; width:160px; height:1px; background:white;"></div>
            <div style="position:absolute; top:45px; left:140px; height:260px; width:1px; background:white;"></div>
        </div>
        <button id="map-close-btn" style="padding:10px 20px; font-size:16px; cursor:pointer;">閉じる</button>
    </div>

    <script src="script.js"></script>
    <script src="keypad.js"></script>
    
    <script>
        const mapOverlay = document.getElementById('map-overlay');
        document.getElementById('map-open-btn').addEventListener('click', () => { mapOverlay.style.display = 'flex'; });
        document.getElementById('map-close-btn').addEventListener('click', () => { mapOverlay.style.display = 'none'; });
    </script>
</body>
</html>
