<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Project Dystopia Chronicle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="map-overlay" style="display:none;">
        <button id="map-close-btn">CLOSE</button>
    </div>
    <button id="map-open-btn">MAP</button>

    <script src="config.js"></script>

    <script src="state.js"></script>

    <script src="flags.js"></script>
    <script src="stage.js"></script>
    <script src="story.js"></script>
    <script src="character.js"></script>

    <script src="utils.js"></script>
    <script src="player.js"></script>
    <script src="ui.js"></script>
    <script src="events.js"></script>
    <script src="save.js"></script>
    <script src="keypad.js"></script>

    <script src="script.js"></script>
    
    <script>
        const mapOverlay = document.getElementById('map-overlay');
        const mapOpenBtn = document.getElementById('map-open-btn');
        const mapCloseBtn = document.getElementById('map-close-btn');

        if(mapOpenBtn) mapOpenBtn.addEventListener('click', () => { mapOverlay.style.display = 'flex'; });
        if(mapCloseBtn) mapCloseBtn.addEventListener('click', () => { mapOverlay.style.display = 'none'; });
    </script>
</body>
</html>
